<!DOCTYPE html>
<title>TrainingPeaks Connection Complete</title>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
  }

  p {
    opacity: 0.7;
  }
</style>
<h2>&#10003; Connected to TrainingPeaks</h2>
<p>You may close this tab and return to the app.</p>
<script>
  // flutter_web_auth_2 callback: post result back to the opener window
  if (window.opener) {
    window.opener.postMessage(
      { "flutter-web-auth-2": window.location.href },
      window.location.origin
    );
    window.close();
  }
</script>
