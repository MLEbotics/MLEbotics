<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="runner_companion_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Running Companion</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://js.stripe.com/v3/"></script>
  <script>
    // Unregister any stale service workers so Flutter loads fresh from network.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        if (regs.length > 0) {
          Promise.all(regs.map(function (r) { return r.unregister(); }))
            .then(function () {
              if ('caches' in window) {
                caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
              window.location.reload();
            });
        }
      });
    }
  </script>
</head>

<body>
  <a href="https://mlebotics.com" title="Back to MLEbotics" style="
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 9999;
    background: rgba(0,0,0,0.6);
    color: #fff;
    text-decoration: none;
    font-family: sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  " onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    mlebotics.com
  </a>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
