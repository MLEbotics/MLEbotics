name: Python CI - AutoFormFiller

on:
  push:
    paths:
      - "AutoFormFiller/**"
  pull_request:
    paths:
      - "AutoFormFiller/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r AutoFormFiller/requirements.txt
      - name: Lint
        run: pip install flake8 && flake8 AutoFormFiller/ --max-line-length=120 --ignore=E501,W503 --exclude=AutoFormFiller/extension,AutoFormFiller/store-assets
