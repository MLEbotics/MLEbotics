name: Zoho Mail Forwarder

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  forward:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run forwarder
        env:
          ZOHO_USER: ${{ secrets.ZOHO_USER }}
          ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
          FORWARD_TO: ${{ secrets.FORWARD_TO }}
        run: python mlebotics.com/tools/zoho_forwarder/forwarder.py
