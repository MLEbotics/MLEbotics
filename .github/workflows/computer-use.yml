name: Python CI - Computer-Use

on:
  push:
    paths:
      - "Computer-Use/**"
  pull_request:
    paths:
      - "Computer-Use/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r Computer-Use/requirements.txt
      - name: Lint
        run: pip install flake8 && flake8 Computer-Use/ --max-line-length=120 --ignore=E501,W503
