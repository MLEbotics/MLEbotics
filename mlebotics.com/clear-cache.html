<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clearing cache...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #000; color: #fff; flex-direction: column; gap: 16px; }
    p { color: #aaa; }
  </style>
</head>
<body>
  <h2>Clearing site cache...</h2>
  <p id="msg">Please wait...</p>
  <script>
    async function clearAll() {
      const msg = document.getElementById('msg');
      // Unregister all service workers
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) { await reg.unregister(); }
        msg.textContent = `Unregistered ${regs.length} service worker(s). Clearing caches...`;
      }
      // Delete all caches
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      msg.textContent = 'Done! Redirecting to RunCompanion...';
      setTimeout(() => { window.location.href = 'https://runcompanion.mlebotics.com'; }, 1000);
    }
    clearAll();
  </script>
</body>
</html>
